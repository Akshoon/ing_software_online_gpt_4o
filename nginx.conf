# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── HTTPS (TLS) ───────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name _;

    # Certificado (auto-firmado para dev; reemplaza por Let's Encrypt en producción)
    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    # Protocolos y cifrados seguros
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 50M;

    # ── Cabeceras de seguridad (A02) ──────────────────────────────────────────
    # HSTS: fuerza HTTPS por 1 año en todos los subdominios
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Evita clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;
    # Evita MIME-sniffing
    add_header X-Content-Type-Options "nosniff" always;
    # CSP básico
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" always;
    # Referrer policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # No exponer versión de Nginx
    server_tokens off;

    location / {
        proxy_pass         http://web:8012;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Comprimir respuestas
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
