services:

  # ── Redis — almacenamiento compartido para Flask-Limiter (A04) ──────────────
  redis:
    image: redis:7-alpine
    container_name: bibliografia_redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  web:
    build: .
    container_name: bibliografia_app
    restart: unless-stopped
    ports:
      - "8012:8012"
    env_file:
      - .env
    environment:
      REDIS_URL: "redis://redis:6379"
    volumes:
      - app_db:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8012/login')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Nginx con TLS ─────────────────────────────────────────────────────────
  # Solo se activa con: docker compose --profile production up -d
  # Genera cert auto-firmado al arrancar si no existe.
  nginx:
    image: nginx:alpine
    container_name: bibliografia_nginx
    restart: unless-stopped
    ports:
      - "8080:80"    # HTTP → redirige a HTTPS
      - "8443:443"   # HTTPS con cert auto-firmado
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_ssl:/etc/nginx/ssl
    entrypoint: >
      sh -c "
        if [ ! -f /etc/nginx/ssl/server.crt ]; then
          apk add --no-cache openssl > /dev/null 2>&1;
          openssl req -x509 -nodes -days 365 -newkey rsa:2048
            -keyout /etc/nginx/ssl/server.key
            -out    /etc/nginx/ssl/server.crt
            -subj '/CN=localhost/O=Dev/C=CL' > /dev/null 2>&1;
        fi;
        nginx -g 'daemon off;'
      "
    depends_on:
      web:
        condition: service_healthy
    profiles:
      - production   # activa con: docker compose --profile production up -d

volumes:
  app_db:
  nginx_ssl:   # almacena el cert auto-firmado entre reinicios
